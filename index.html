<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz@0,14..32;1,14..32&display=swap" rel="stylesheet">
  <title>Colorsh</title>
</head>

<body>
  <header>
    <h1>Colorsh</h1>
  </header>
  <main>
    <section id="color-scheme-settings" class="color-scheme-settings">
      <label>
        <input type="color" id="color-picker">
      </label>
      <label>
        <select name="mode" id="scheme-mode">
          <option value="monochrome">Monochrome</option>
          <option value="monochrome-light">Monochrome-light</option>
          <option value="monochrome-dark">Monochrome-dark</option>
          <option value="analogic">Analogic</option>
          <option value="analogic-complement">Analogic-complement</option>
          <option value="complement">Complement</option>
          <option value="triad">Triad</option>
          <option value="quad">Quad</option>
        </select>
      </label>
      <button type="button" id="get-color-scheme" class="get-color-scheme-btn">Get color scheme</button>
    </section>
    <section id="color-palletes" class="color-palletes">
    </section>
  </main>
  <footer>
  </footer>
  <script src="script.js"></script>
</body>

</html>
